name: Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1" # Weekly on Monday

jobs:
  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # audit-ci wraps the audit with an allowlist (audit-ci.jsonc) so a
      # build-tooling-only advisory can't red-gate unrelated PRs. Every
      # allowlist entry carries a reason + removal condition. See issue #264.
      # audit-ci auto-detects pnpm-lock.yaml, no npm dependency here.
      - run: npx audit-ci --config audit-ci.jsonc

  cargo-audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo install cargo-audit
      # Workspace lockfile lives at the repo root after the workspace migration
      # (Agent sidecar uses pi-mono SDK).
      - run: cargo audit

  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: typescript, rust
      - uses: github/codeql-action/analyze@v3
